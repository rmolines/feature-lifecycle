<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission View — Launchpad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/views/shared/tokens.css">
<script src="/views/shared/components.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="/views/shared/ws-client.js"></script>
<style>
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }

  /* ── Header ──────────────────────────────────────────────────────────── */
  .mv-header {
    flex-shrink: 0;
    background: var(--color-panel);
    border-bottom: 1px solid var(--color-border);
    padding: 16px 24px;
  }

  .breadcrumb {
    font-size: var(--font-size-xs);
    color: var(--color-text-secondary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb-link {
    color: var(--color-accent);
    text-decoration: none;
  }

  .breadcrumb-link:hover { text-decoration: underline; }

  .breadcrumb-sep { color: var(--color-text-muted); }

  .breadcrumb-current { color: var(--color-text-primary); }

  /* ── Main content ────────────────────────────────────────────────────── */
  .mv-main { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── Stage grid ──────────────────────────────────────────────────────── */
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .stage-card {
    background: var(--color-panel);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    display: block;
    border-left: 3px solid var(--color-border);
  }

  .stage-card:hover {
    transform: translateY(-2px);
    border-color: var(--color-accent-light);
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.07);
  }

  .stage-card.backlog {
    border-left-color: var(--color-text-muted);
    opacity: 0.7;
  }

  .stage-card.backlog:hover {
    opacity: 1;
  }

  .stage-name {
    font-size: var(--font-size-md);
    font-weight: 600;
    color: var(--color-text-bright);
    margin: 0 0 4px;
  }

  .stage-hypothesis {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    line-height: 1.5;
    margin-bottom: 12px;
    min-height: 28px;
  }

  .stage-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
  }

  .stage-module-count {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stage-module-count .count {
    color: var(--color-text-secondary);
    font-weight: 500;
  }

  .backlog-label {
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  /* ── Skeleton ────────────────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, #1a1d2e 25%, #222638 50%, #1a1d2e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius-sm);
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .empty-state {
    color: var(--color-text-muted);
    font-size: var(--font-size-sm);
    text-align: center;
    padding: 60px 20px;
    border: 1px dashed var(--color-border);
    border-radius: var(--radius-md);
  }
</style>
</head>
<body>
<div x-data="missionView()" x-init="init()" style="display:flex; flex-direction:column; height:100%;">

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <header class="mv-header">
    <div class="breadcrumb" x-html="breadcrumb"></div>

    <!-- Loading skeleton -->
    <div x-show="loading">
      <div class="skeleton" style="height:18px; width:200px; margin-bottom:8px;"></div>
      <div class="skeleton" style="height:11px; width:320px;"></div>
    </div>

    <!-- Mission header -->
    <div x-show="!loading && mission">
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px;">
        <div style="flex:1; min-width:0;">
          <h1 style="font-size:18px; font-weight:600; color:var(--color-text-bright); margin:0 0 4px;" x-text="mission ? (mission.alias || mission.id) : '—'"></h1>
          <div style="font-size:var(--font-size-sm); color:var(--color-text-secondary);" x-text="mission ? (mission.description || '') : ''"></div>
        </div>
        <div style="display:flex; gap:16px; flex-shrink:0; font-size:var(--font-size-sm); color:var(--color-text-muted);">
          <div>
            <div style="font-size:18px; font-weight:600; color:var(--color-text-bright);" x-text="stages.length"></div>
            <div>stages</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div x-show="!loading && error" style="color:var(--color-danger); font-size:var(--font-size-sm);" x-text="error"></div>
  </header>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main class="mv-main">

    <!-- Loading skeleton -->
    <div x-show="loading" class="stage-grid">
      <template x-for="i in 4" :key="i">
        <div class="panel" style="padding:16px 18px; border-left:3px solid var(--color-border);">
          <div class="skeleton" style="height:13px; width:45%; margin-bottom:8px;"></div>
          <div class="skeleton" style="height:10px; width:75%; margin-bottom:6px;"></div>
          <div class="skeleton" style="height:10px; width:55%; margin-bottom:14px;"></div>
          <div class="skeleton" style="height:9px; width:70px;"></div>
        </div>
      </template>
    </div>

    <!-- Empty -->
    <div x-show="!loading && !error && stages.length === 0" class="empty-state">
      no stages found for this mission
    </div>

    <!-- Stage grid -->
    <div x-show="!loading && !error && stages.length > 0" class="stage-grid">
      <template x-for="stage in regularStages" :key="stage.id">
        <a
          class="stage-card"
          :href="'/stage-view?m=' + missionId + '&s=' + stage.id"
        >
          <div class="stage-name" x-text="stage.name || stage.id"></div>
          <div class="stage-hypothesis" x-text="stage.hypothesis || stage.description || 'no description'"></div>
          <div class="stage-meta">
            <div class="stage-module-count">
              <span>modules</span>
              <span class="count" x-text="(stage.modules || []).length"></span>
            </div>
            <template x-if="aggregatedStatus(stage)">
              <span class="badge" :class="'badge-' + aggregatedStatus(stage)" x-text="aggregatedStatus(stage)"></span>
            </template>
          </div>
        </a>
      </template>

      <!-- Backlog (special card) -->
      <template x-if="backlogStage">
        <a
          class="stage-card backlog"
          :href="'/stage-view?m=' + missionId + '&s=' + backlogStage.id"
        >
          <div class="backlog-label">backlog</div>
          <div class="stage-name" x-text="backlogStage.name || 'Backlog'"></div>
          <div class="stage-hypothesis" x-text="backlogStage.description || 'unscheduled modules'"></div>
          <div class="stage-meta">
            <div class="stage-module-count">
              <span>modules</span>
              <span class="count" x-text="(backlogStage.modules || []).length"></span>
            </div>
          </div>
        </a>
      </template>
    </div>
  </main>
</div>

<script>
(function () {
  document.addEventListener("alpine:init", function () {
    Alpine.data("missionView", function () {
      return {
        loading: true,
        error: null,
        missionId: "",
        mission: null,
        stages: [],

        init: function () {
          var params = new URLSearchParams(location.search);
          this.missionId = params.get("m") || "";
          if (!this.missionId) {
            this.error = "No mission specified. Add ?m=<id> to the URL.";
            this.loading = false;
            return;
          }
          this.fetchData();
        },

        fetchData: function () {
          var self = this;
          self.loading = true;
          self.error = null;

          var missionsP = fetch("/api/missions")
            .then(function (r) { return r.ok ? r.json() : Promise.reject("HTTP " + r.status); })
            .then(function (d) {
              var missions = d.missions || [];
              self.mission = missions.find(function (m) {
                return m.id === self.missionId || m.alias === self.missionId;
              }) || null;
            });

          var stagesP = fetch("/api/missions/" + encodeURIComponent(self.missionId) + "/stages")
            .then(function (r) { return r.ok ? r.json() : Promise.reject("HTTP " + r.status); })
            .then(function (d) {
              self.stages = d.stages || [];
            });

          Promise.all([missionsP, stagesP])
            .then(function () { self.loading = false; })
            .catch(function (err) { self.error = String(err); self.loading = false; });
        },

        get breadcrumb() {
          return renderBreadcrumb([
            { label: "Launch Complex", href: "/cockpit" },
            { label: this.missionId },
          ]);
        },

        get regularStages() {
          return this.stages.filter(function (s) { return s.id !== "_backlog"; });
        },

        get backlogStage() {
          return this.stages.find(function (s) { return s.id === "_backlog"; }) || null;
        },

        aggregatedStatus: function (stage) {
          var modules = stage.modules || [];
          if (modules.length === 0) return "seed";
          var counts = {};
          modules.forEach(function (m) { var s = m.status || "seed"; counts[s] = (counts[s] || 0) + 1; });
          var order = ["shipped", "approved", "done", "building", "planned", "ready", "exploring", "seed"];
          for (var i = 0; i < order.length; i++) {
            if (counts[order[i]]) return order[i];
          }
          return "seed";
        },
      };
    });
  });
})();
</script>
</body>
</html>
