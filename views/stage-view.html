<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage View — Launchpad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/views/shared/tokens.css">
<script src="/views/shared/components.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="/views/shared/ws-client.js"></script>
<style>
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }

  /* ── Header ──────────────────────────────────────────────────────────── */
  .sv-header {
    flex-shrink: 0;
    background: var(--color-panel);
    border-bottom: 1px solid var(--color-border);
    padding: 16px 24px;
  }

  .breadcrumb {
    font-size: var(--font-size-xs);
    color: var(--color-text-secondary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb-link {
    color: var(--color-accent);
    text-decoration: none;
  }

  .breadcrumb-link:hover { text-decoration: underline; }

  .breadcrumb-sep { color: var(--color-text-muted); }

  .breadcrumb-current { color: var(--color-text-primary); }

  /* ── Main content ────────────────────────────────────────────────────── */
  .sv-main { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── Module grid ─────────────────────────────────────────────────────── */
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .module-card {
    background: var(--color-panel);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    display: block;
    border-left: 3px solid var(--color-border);
  }

  .module-card:hover {
    transform: translateY(-1px);
    filter: brightness(1.12);
  }

  .module-card.status-exploring { border-left-color: var(--color-exploring); }
  .module-card.status-ready     { border-left-color: var(--color-ready); }
  .module-card.status-planned   { border-left-color: var(--color-planned); }
  .module-card.status-building  { border-left-color: var(--color-building); }
  .module-card.status-done      { border-left-color: var(--color-done); }
  .module-card.status-approved  { border-left-color: var(--color-approved); }
  .module-card.status-shipped   { border-left-color: var(--color-shipped); opacity: 0.6; }

  .module-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .module-name {
    font-size: var(--font-size-md);
    font-weight: 500;
    color: var(--color-text-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .module-problem {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .module-artifacts {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .artifact-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .artifact-pill.present {
    background: rgba(74,222,128,0.1);
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.2);
  }

  .artifact-pill.absent {
    background: rgba(71,85,105,0.1);
    color: #334155;
    border: 1px solid rgba(71,85,105,0.15);
  }

  /* ── Skeleton ────────────────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, #1a1d2e 25%, #222638 50%, #1a1d2e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius-sm);
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .empty-state {
    color: var(--color-text-muted);
    font-size: var(--font-size-sm);
    text-align: center;
    padding: 60px 20px;
    border: 1px dashed var(--color-border);
    border-radius: var(--radius-md);
  }
</style>
</head>
<body>
<div x-data="stageView()" x-init="init()" style="display:flex; flex-direction:column; height:100%;">

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <header class="sv-header">
    <div class="breadcrumb" x-html="breadcrumb"></div>

    <!-- Loading skeleton -->
    <div x-show="loading">
      <div class="skeleton" style="height:18px; width:220px; margin-bottom:8px;"></div>
      <div class="skeleton" style="height:11px; width:300px;"></div>
    </div>

    <!-- Stage header -->
    <div x-show="!loading && !error">
      <h1 style="font-size:18px; font-weight:600; color:var(--color-text-bright); margin:0 0 4px;" x-text="stageId"></h1>
      <div style="font-size:var(--font-size-sm); color:var(--color-text-secondary);" x-text="modules.length + ' modules'"></div>
    </div>

    <!-- Error -->
    <div x-show="!loading && error" style="color:var(--color-danger); font-size:var(--font-size-sm);" x-text="error"></div>
  </header>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main class="sv-main">

    <!-- Loading skeleton -->
    <div x-show="loading" class="module-grid">
      <template x-for="i in 6" :key="i">
        <div class="panel" style="padding:14px 16px; border-left:3px solid var(--color-border);">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <div class="skeleton" style="height:12px; width:50%;"></div>
            <div class="skeleton" style="height:12px; width:55px;"></div>
          </div>
          <div class="skeleton" style="height:10px; width:80%; margin-bottom:6px;"></div>
          <div class="skeleton" style="height:10px; width:65%; margin-bottom:12px;"></div>
          <div style="display:flex; gap:4px;">
            <div class="skeleton" style="height:16px; width:38px;"></div>
            <div class="skeleton" style="height:16px; width:38px;"></div>
            <div class="skeleton" style="height:16px; width:38px;"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Empty -->
    <div x-show="!loading && !error && modules.length === 0" class="empty-state">
      no modules found for this stage
    </div>

    <!-- Module grid -->
    <div x-show="!loading && !error && modules.length > 0" class="module-grid">
      <template x-for="mod in modules" :key="mod.id">
        <a
          class="module-card"
          :class="'status-' + (statusMap[mod.id] || 'seed')"
          :href="'/module-view?m=' + missionId + '&s=' + stageId + '&mod=' + mod.id"
        >
          <div class="module-card-header">
            <div class="module-name" x-text="mod.name || mod.id"></div>
            <div style="display:flex; align-items:center; gap:5px; flex-shrink:0;">
              <span class="status-dot" :class="'dot-' + (statusMap[mod.id] || 'seed')"></span>
              <span class="badge" :class="'badge-' + (statusMap[mod.id] || 'seed')" x-text="statusMap[mod.id] || 'seed'"></span>
            </div>
          </div>
          <div class="module-problem" x-text="mod.problem || mod.description || ''"></div>
          <div class="module-artifacts">
            <template x-for="artifact in getArtifacts(mod)" :key="artifact.type">
              <span class="artifact-pill" :class="artifact.present ? 'present' : 'absent'" x-text="artifact.type"></span>
            </template>
          </div>
        </a>
      </template>
    </div>
  </main>
</div>

<script>
(function () {
  var ARTIFACT_TYPES = ["draft", "prd", "plan", "results", "review"];

  document.addEventListener("alpine:init", function () {
    Alpine.data("stageView", function () {
      return {
        loading: true,
        error: null,
        missionId: "",
        stageId: "",
        modules: [],
        statusMap: {},

        init: function () {
          var params = new URLSearchParams(location.search);
          this.missionId = params.get("m") || "";
          this.stageId = params.get("s") || "";
          if (!this.missionId || !this.stageId) {
            this.error = "Missing ?m= or ?s= parameters.";
            this.loading = false;
            return;
          }
          this.fetchData();
        },

        fetchData: function () {
          var self = this;
          self.loading = true;
          self.error = null;

          var url = "/api/missions/" + encodeURIComponent(self.missionId) + "/" + encodeURIComponent(self.stageId) + "/modules";

          fetch(url)
            .then(function (r) {
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.json();
            })
            .then(function (d) {
              self.modules = d.modules || [];
              self.loading = false;
              self.fetchStatuses();
            })
            .catch(function (err) {
              self.error = String(err);
              self.loading = false;
            });
        },

        fetchStatuses: function () {
          var self = this;
          self.modules.forEach(function (mod) {
            var statusUrl = "/api/missions/" + encodeURIComponent(self.missionId) + "/" +
              encodeURIComponent(self.stageId) + "/" + encodeURIComponent(mod.id) + "/status";
            fetch(statusUrl)
              .then(function (r) { return r.ok ? r.json() : null; })
              .then(function (d) {
                if (d && d.status) {
                  self.statusMap[mod.id] = d.status;
                }
              })
              .catch(function () {});
          });
        },

        getArtifacts: function (mod) {
          var present = {};
          (mod.artifacts || []).forEach(function (a) { present[a] = true; });
          return ARTIFACT_TYPES.map(function (t) {
            return { type: t, present: !!present[t] };
          });
        },

        get breadcrumb() {
          return renderBreadcrumb([
            { label: "Launch Complex", href: "/cockpit" },
            { label: this.missionId, href: "/mission-view?m=" + encodeURIComponent(this.missionId) },
            { label: this.stageId },
          ]);
        },
      };
    });
  });
})();
</script>
</body>
</html>
