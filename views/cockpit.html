<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch Complex — Launchpad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/views/shared/tokens.css">
<script src="/views/shared/components.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="/views/shared/ws-client.js"></script>
<style>
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }

  /* ── Header ──────────────────────────────────────────────────────────── */
  .lc-header {
    flex-shrink: 0;
    background: var(--color-panel);
    border-bottom: 1px solid var(--color-border);
    padding: 20px 28px 16px;
  }

  .lc-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .lc-icon {
    font-size: 20px;
    line-height: 1;
    opacity: 0.85;
  }

  .lc-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-text-bright);
    margin: 0;
    letter-spacing: 0.01em;
  }

  .lc-subtitle {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    margin-left: 32px;
  }

  .lc-stats {
    display: flex;
    gap: 24px;
    margin-top: 14px;
    margin-left: 32px;
  }

  .stat-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
  }

  .stat-chip strong {
    color: var(--color-text-bright);
    font-weight: 600;
  }

  /* ── Main ────────────────────────────────────────────────────────────── */
  .lc-main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

  /* ── Mission grid ────────────────────────────────────────────────────── */
  .mission-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .mission-card {
    background: var(--color-panel);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
    display: block;
    border-left: 3px solid var(--color-accent);
  }

  .mission-card:hover {
    transform: translateY(-2px);
    border-color: var(--color-accent-light);
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.08);
  }

  .mission-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .mission-name {
    font-size: var(--font-size-md);
    font-weight: 600;
    color: var(--color-text-bright);
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mission-thesis {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    line-height: 1.5;
    margin-bottom: 14px;
    min-height: 30px;
  }

  .mission-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
  }

  .mission-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .mission-meta-value {
    color: var(--color-text-secondary);
    font-weight: 500;
  }

  /* ── Skeleton ────────────────────────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, #1a1d2e 25%, #222638 50%, #1a1d2e 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius-sm);
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .empty-state {
    color: var(--color-text-muted);
    font-size: var(--font-size-sm);
    text-align: center;
    padding: 60px 20px;
    border: 1px dashed var(--color-border);
    border-radius: var(--radius-md);
  }
</style>
</head>
<body>
<div x-data="cockpitView()" x-init="init()" style="display:flex; flex-direction:column; height:100%;">

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <header class="lc-header">
    <div class="lc-title-row">
      <span class="lc-icon">🚀</span>
      <h1 class="lc-title">Launch Complex</h1>
    </div>
    <div class="lc-subtitle">mission workspace</div>

    <div class="lc-stats">
      <div class="stat-chip">
        <strong x-text="missions.length"></strong>
        missions
      </div>
      <div class="stat-chip">
        <strong x-text="totalStages"></strong>
        stages
      </div>
      <div class="stat-chip">
        <strong x-text="totalModules"></strong>
        modules
      </div>
    </div>
  </header>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <main class="lc-main">

    <!-- Loading skeleton -->
    <div x-show="loading" class="mission-grid">
      <template x-for="i in 6" :key="i">
        <div class="panel" style="padding:18px 20px; border-left:3px solid var(--color-accent);">
          <div class="skeleton" style="height:14px; width:40%; margin-bottom:10px;"></div>
          <div class="skeleton" style="height:10px; width:80%; margin-bottom:6px;"></div>
          <div class="skeleton" style="height:10px; width:60%; margin-bottom:16px;"></div>
          <div style="display:flex; gap:16px;">
            <div class="skeleton" style="height:9px; width:50px;"></div>
            <div class="skeleton" style="height:9px; width:50px;"></div>
          </div>
        </div>
      </template>
    </div>

    <!-- Error -->
    <div x-show="!loading && error" style="color:var(--color-danger); font-size:var(--font-size-sm); padding:20px 0;" x-text="error"></div>

    <!-- Empty -->
    <div x-show="!loading && !error && missions.length === 0" class="empty-state">
      no missions found
    </div>

    <!-- Mission grid -->
    <div x-show="!loading && !error && missions.length > 0" class="mission-grid">
      <template x-for="m in missions" :key="m.id">
        <a
          class="mission-card"
          :href="'/mission-view?m=' + m.id"
        >
          <div class="mission-card-header">
            <div class="mission-name" x-text="m.alias || m.id"></div>
            <span class="badge badge-seed" x-text="m.id"></span>
          </div>
          <div class="mission-thesis" x-text="m.description || m.thesis || 'no description'"></div>
          <div class="mission-meta">
            <div class="mission-meta-item">
              <span>stages</span>
              <span class="mission-meta-value" x-text="(m.stages || []).length"></span>
            </div>
            <div class="mission-meta-item">
              <span>modules</span>
              <span class="mission-meta-value" x-text="countModules(m)"></span>
            </div>
          </div>
        </a>
      </template>
    </div>
  </main>
</div>

<script>
(function () {
  document.addEventListener("alpine:init", function () {
    Alpine.data("cockpitView", function () {
      return {
        loading: true,
        error: null,
        missions: [],

        init: function () {
          this.fetchData();
        },

        fetchData: function () {
          var self = this;
          self.loading = true;
          self.error = null;

          fetch("/api/missions")
            .then(function (r) {
              if (!r.ok) throw new Error("HTTP " + r.status);
              return r.json();
            })
            .then(function (d) {
              self.missions = d.missions || [];
              self.loading = false;
            })
            .catch(function (err) {
              self.error = String(err);
              self.loading = false;
            });
        },

        countModules: function (m) {
          if (!m.stages) return 0;
          var total = 0;
          m.stages.forEach(function (s) {
            total += (s.modules || []).length;
          });
          return total;
        },

        get totalStages() {
          var total = 0;
          this.missions.forEach(function (m) {
            total += (m.stages || []).length;
          });
          return total;
        },

        get totalModules() {
          var self = this;
          var total = 0;
          this.missions.forEach(function (m) {
            total += self.countModules(m);
          });
          return total;
        },
      };
    });
  });
})();
</script>
</body>
</html>
